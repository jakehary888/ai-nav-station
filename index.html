<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Nexus - 探索未来AI工具宇宙</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 背景动画 -->
    <div class="bg-animation">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
    </div>

    <!-- 导航栏 -->
    <nav class="navbar glass-effect">
        <div class="container">
            <div class="logo">
                <span class="logo-icon">🚀</span>
                <span>AI Nexus</span>
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索AI工具...">
                <span class="search-icon">🔍</span>
            </div>
            <div class="nav-links">
                <a href="#hot" class="nav-link active">🔥热门</a>
                <a href="#new" class="nav-link">✨最新</a>
                <a href="#category" class="nav-link">📁分类</a>
            </div>
        </div>
    </nav>

    <!-- 英雄区域 -->
    <section class="hero-section">
        <div class="container">
            <h1 class="hero-title">
                探索未来<br>
                <span class="gradient-text">AI工具宇宙</span>
            </h1>
            <p class="hero-subtitle">收录全球1000+顶级AI工具，一站式发现你的智能助手</p>
            
            <!-- 快捷标签 -->
            <div class="quick-tags">
                <button class="tag-btn active" data-category="all">全部</button>
                <button class="tag-btn" data-category="chat">💬 聊天助手</button>
                <button class="tag-btn" data-category="image">🎨 图像设计</button>
                <button class="tag-btn" data-category="video">🎬 视频创作</button>
                <button class="tag-btn" data-category="code">💻 编程开发</button>
                <button class="tag-btn" data-category="writing">✍️ 写作助手</button>
            </div>

            <!-- 统计数据 -->
            <div class="stats-section">
                <div class="stat-card glass-effect">
                    <div class="stat-number">1000+</div>
                    <div class="stat-label">AI工具</div>
                </div>
                <div class="stat-card glass-effect">
                    <div class="stat-number">16</div>
                    <div class="stat-label">分类场景</div>
                </div>
                <div class="stat-card glass-effect">
                    <div class="stat-number">50K+</div>
                    <div class="stat-label">日活用户</div>
                </div>
                <div class="stat-card glass-effect">
                    <div class="stat-number">24h</div>
                    <div class="stat-label">实时更新</div>
                </div>
            </div>
        </div>
    </section>

    <!-- 工具网格 -->
    <section class="container">
        <div id="toolsGrid" class="tools-section"></div>
        
        <!-- 加载更多 -->
        <div class="load-more">
            <button class="load-more-btn">加载更多工具</button>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <p>© 2026 AI Nexus. 探索AI的无限可能</p>
        </div>
    </footer>

    <!-- 引入JavaScript -->
    <script src="main.js"></script>
</body>
</html>
